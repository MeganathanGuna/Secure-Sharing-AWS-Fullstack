<!-- src/app/pages/blockchain/blockchain.component.html -->
<div class="page-container">
  <mat-card>
    <h2>Blockchain Ledger</h2>

    <table mat-table [dataSource]="chain">

      <ng-container matColumnDef="index">
        <th mat-header-cell *matHeaderCellDef>#</th>
        <td mat-cell *matCellDef="let b">{{ b.index }}</td>
      </ng-container>

      <ng-container matColumnDef="data">
        <th mat-header-cell *matHeaderCellDef>Data</th>
        <td mat-cell *matCellDef="let b">{{ b.data | json }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['index','data']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['index','data'];"></tr>

    </table>
  </mat-card>
</div>
